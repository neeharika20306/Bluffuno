<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BluffUno — The Art of Deception</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- GRAIN OVERLAY -->
  <div class="grain"></div>

  <!-- AMBIENT ORBS -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div id="setup-screen">
    <div class="setup-inner">
      <div class="setup-logo">
        <div class="logo-eyebrow">THE ART OF DECEPTION</div>
        <h1 class="logo-title">Bluff<span>Uno</span></h1>
        <div class="logo-rule"></div>
      </div>

      <div class="setup-card">
        <div class="setup-field">
          <label class="field-label">NUMBER OF PLAYERS</label>
          <div class="custom-select-wrap">
            <select id="player-count">
              <option value="2">Two Players</option>
              <option value="3" selected>Three Players</option>
              <option value="4">Four Players</option>
            </select>
            <span class="select-arrow">▾</span>
          </div>
        </div>

        <div id="name-inputs" class="name-inputs"></div>

        <button id="btn-start" class="btn-primary">
          <span>DEAL THE CARDS</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

      <div class="setup-footer">Card game for 2–4 players &nbsp;·&nbsp; Bluff wisely</div>
    </div>
  </div>

  <div id="game-screen" class="hidden">

    <!-- HEADER -->
    <header id="game-header">
      <div class="header-logo">Bluff<span>Uno</span></div>

      <div class="header-pills">
        <div class="pill">
          <span class="pill-label">TURN</span>
          <span class="pill-value" id="hud-turn">—</span>
        </div>
        <div class="pill pill-color">
          <span class="pill-label">COLOR</span>
          <span class="pill-value" id="hud-color">—</span>
          <div class="color-dot" id="hud-color-dot"></div>
        </div>
        <div class="pill">
          <span class="pill-label">DECK</span>
          <span class="pill-value" id="hud-deck">—</span>
        </div>
      </div>

      <button class="btn-ghost" id="btn-new-game">NEW GAME</button>
    </header>

    <!-- TABLE -->
    <main id="table">

      <!-- OPPONENTS STRIP -->
      <section id="opponents-strip"></section>

      <!-- CENTER ARENA -->
      <section id="arena">

        <!-- Draw Pile -->
        <div class="pile-group" id="draw-group">
          <div class="pile-label">DRAW</div>
          <div class="draw-stack" id="draw-stack"></div>
          <div class="pile-count" id="deck-count-lbl"></div>
        </div>

        <!-- Middle info -->
        <div id="arena-center">
          <div id="current-color-ring"></div>
          <div id="bluff-notice" class="hidden">
            <div class="bluff-icon">🎭</div>
            <div class="bluff-text" id="bluff-text-content">Face-down card played</div>
            <div class="bluff-sub">Call their bluff?</div>
          </div>
          <div id="turn-arrow" class="hidden">
            <svg id="arrow-svg" viewBox="0 0 40 40" width="40" height="40">
              <path d="M20 4 L36 20 L20 36" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

        <!-- Discard Pile -->
        <div class="pile-group" id="discard-group">
          <div class="pile-label">DISCARD</div>
          <div class="discard-zone" id="discard-zone"></div>
        </div>

      </section>

      <!-- ACTION BAR -->
      <section id="action-bar">
        <button class="action-btn btn-play"  id="btn-play"  disabled>
          <span class="action-icon">▶</span>
          <span>Play Card</span>
        </button>
        <button class="action-btn btn-draw-card" id="btn-draw" disabled>
          <span class="action-icon">🂠</span>
          <span>Draw</span>
        </button>
        <button class="action-btn btn-bluff" id="btn-bluff" disabled>
          <span class="action-icon">🎭</span>
          <span>Bluff</span>
        </button>
        <button class="action-btn btn-call"  id="btn-call"  disabled>
          <span class="action-icon">🔍</span>
          <span>Call Bluff!</span>
        </button>
        <button class="action-btn btn-uno"   id="btn-uno"   disabled>
          <span class="action-icon">!</span>
          <span>UNO</span>
        </button>
      </section>

      <!-- PLAYER ZONE -->
      <section id="player-zone">
        <div class="player-meta">
          <div class="turn-indicator" id="player-turn-ind"></div>
          <span class="player-zone-name" id="player-zone-name">YOU</span>
          <span class="hand-hint">Tap to select · Double-tap to play</span>
        </div>
        <div id="player-hand"></div>
      </section>

    </main>

  </div><!-- /game-screen -->

  <div id="game-log">
    <div class="log-title">MATCH LOG</div>
    <div id="log-entries"></div>
  </div>

  <div id="color-modal">
    <div class="color-modal-box">
      <div class="modal-eyebrow">WILD CARD</div>
      <h3 class="modal-title">Choose Your Color</h3>
      <div class="color-swatches">
        <button class="swatch" data-color="red">
          <div class="swatch-fill" style="background:#c0392b"></div>
          <span>Red</span>
        </button>
        <button class="swatch" data-color="blue">
          <div class="swatch-fill" style="background:#2471a3"></div>
          <span>Blue</span>
        </button>
        <button class="swatch" data-color="green">
          <div class="swatch-fill" style="background:#1e8449"></div>
          <span>Green</span>
        </button>
        <button class="swatch" data-color="yellow">
          <div class="swatch-fill" style="background:#b7950b"></div>
          <span>Yellow</span>
        </button>
      </div>
    </div>
  </div>

  <div id="win-overlay" class="hidden">
    <div class="win-box">
      <div class="win-crest">✦</div>
      <h2 class="win-title" id="win-title">Victory</h2>
      <p class="win-sub" id="win-sub">You have mastered the art of deception.</p>
      <div class="win-rule"></div>
      <button class="btn-primary" onclick="location.reload()">
        <span>PLAY AGAIN</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="game.js"></script>
</body>
</html>
